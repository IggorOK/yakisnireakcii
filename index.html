var SAVE_KEY="chem_detective_v2";
function loadProg(){try{var d=JSON.parse(localStorage.getItem(SAVE_KEY));if(d&&d.ver===2)return d;}catch(e){}return{ver:2,done:{},badges:[]};}
function saveProg(p){try{localStorage.setItem(SAVE_KEY,JSON.stringify(p));}catch(e){}}
function checkBadges(p){
  var newB=[];
  BADGES.forEach(function(b){
    if(p.badges.indexOf(b.id)===-1&&b.check(p)){p.badges.push(b.id);newB.push(b);}
  });
  return newB;
}

function shuffle(a){var b=[].concat(a);for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function ResultScreen(p){
  var ch=p.challenge,so=p.shuffledOrder,gu=p.guesses,ru=p.reagentsUsed;
  var cc=0;so.forEach(function(s,i){if(gu[i]===s)cc++;});
  var t=ch.substances.length,ok=cc===t;
  var st=ru<=ch.optimalReagents?3:ru<=ch.optimalReagents+1?2:1;
  var fs=ok?st:0;

  // Save progress & check badges
  var _nb=useState([]),newBadges=_nb[0],setNewBadges=_nb[1];
  useEffect(function(){
    if(!ok)return;
    var prog=loadProg();
    var prev=prog.done[ch.id];
    if(!prev||fs>prev.stars){
      prog.done[ch.id]={stars:fs,reagents:ru,noHint:!p.usedHint};
    }
    if(!prev&&!p.usedHint){
      prog.done[ch.id]=prog.done[ch.id]||{};
      prog.done[ch.id].noHint=true;
    }
    var nb=checkBadges(prog);
    saveProg(prog);
    if(nb.length)setNewBadges(nb);
    if(p.onProgress)p.onProgress();
  },[]);

  return h('div',{style:{textAlign:"center",animation:"popIn .5s ease",padding:"20px 0"}},
    h('div',{style:{fontSize:48,marginBottom:8}},ok?"🎉":"😔"),

    ok&&ru<=ch.optimalReagents&&h('p',{style:{color:"#059669",fontSize:14,fontWeight:700,marginBottom:14}},"Мінімум реактивів! 🏆"),

        h('span',{style:{fontSize:20}},b.icon),

function GameScreen(p){
  var ch=CHALLENGES.find(function(c){return c.id===p.challengeId;});
  var _so=useState([]),so=_so[0],setSo=_so[1];
  var _sr=useState(null),sr=_sr[0],setSr=_sr[1];
  var _tr=useState({}),tr=_tr[0],setTr=_tr[1];
  var _obs=useState([]),obs=_obs[0],setObs=_obs[1];
  var _ru=useState([]),ru=_ru[0],setRu=_ru[1]; // array of used reagent ids
  var _ph=useState("experiment"),ph=_ph[0],setPh=_ph[1];
  var _gu=useState({}),gu=_gu[0],setGu=_gu[1];
  var _hint=useState(false),showHint=_hint[0],setHint=_hint[1];
  var _everHint=useState(false),everHint=_everHint[0],setEverHint=_everHint[1];
  var _lr=useState(null),lr=_lr[0],setLr=_lr[1];
  var timer=useRef(null);

  useEffect(function(){
    setSo(shuffle(ch.substances));setSr(null);setTr({});setObs([]);setRu([]);setPh("experiment");setGu({});setHint(false);setEverHint(false);setLr(null);
  },[p.challengeId]);

  var onTube=useCallback(function(ti){
    if(ph!=="experiment"||!sr)return;
    var sid=so[ti];var rx=RX[sid]&&RX[sid][sr];if(!rx)return;
    var done=false;obs.forEach(function(o){if(o.tube===ti&&o.reagentId===sr)done=true;});
    if(done)return;
    var rg;ALL_REAGENTS.forEach(function(r){if(r.id===sr)rg=r;});
    var newTr=Object.assign({},tr);
    newTr[ti]=(newTr[ti]||[]).concat([{reagentId:sr,result:rx}]);
    setTr(newTr);
    setObs(obs.concat([{tube:ti,reagentId:sr,reagentFormula:rg.formula,result:rx}]));
    if(ru.indexOf(sr)===-1)setRu(ru.concat([sr]));
    setLr({tube:ti,result:rx});
    if(timer.current)clearTimeout(timer.current);
    timer.current=setTimeout(function(){setLr(null);},2200);
  },[ph,sr,so,obs,tr,ru]);

  var retry=useCallback(function(){
    setSo(shuffle(ch.substances));setSr(null);setTr({});setObs([]);setRu([]);setPh("experiment");setGu({});setHint(false);setEverHint(false);setLr(null);
  },[ch]);

  if(!so.length)return null;

  return h('div',{style:{maxWidth:600,margin:"0 auto",padding:"0 14px"}},
    // Top bar
    h('div',{style:{display:"flex",alignItems:"center",gap:8,marginBottom:14}},
      h('button',{onClick:p.onBack,style:{background:"none",color:"#999",fontSize:20,padding:"4px 6px"}},"←"),
      h('div',{style:{flex:1}},
        h('h3',{style:{fontSize:15,fontWeight:700,margin:0,color:"#222"}},ch.title),
        h('p',{style:{fontSize:11,color:"#999",margin:0}},ch.desc)
      ),
      h('div',{style:{fontFamily:"'IBM Plex Mono',monospace",fontSize:12,color:"#888",background:"#fff",border:"1px solid #e0ddd5",borderRadius:8,padding:"3px 10px"}},"🧪×"+ru.length)
    ),

    ph==="result"&&h(ResultScreen,{challenge:ch,shuffledOrder:so,guesses:gu,reagentsUsed:ru.length,usedHint:everHint,onRetry:retry,onNext:p.onNext,onHome:p.onBack,onProgress:p.onProgress}),

    ph==="guess"&&[
      h('div',{key:"tubes",style:{display:"flex",justifyContent:"center",gap:22,marginBottom:18,padding:"14px 0"}},
        so.map(function(s,i){return h(TestTube,{key:i,index:i,substance:s,reactions:tr[i],selected:false,onClick:function(){},guessed:gu[i]});})
      ),
      h(GuessPanel,{key:"gp",challenge:ch,guesses:gu,setGuesses:setGu,onSubmit:function(){setPh("result");},onCancel:function(){setPh("experiment");}})
    ],

    ph==="experiment"&&[
      // Rack
      h('div',{key:"rack",style:{background:"#fff",border:"1px solid #e0ddd5",borderRadius:16,padding:"20px 14px 16px",marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,.03)"}},
        h('p',{style:{fontSize:11,color:"#aaa",textAlign:"center",marginBottom:14,fontFamily:"'IBM Plex Mono',monospace"}},
          sr?("▸ Натисни на пробірку, щоб додати "+(function(){var f="";ALL_REAGENTS.forEach(function(r){if(r.id===sr)f=r.formula;});return f;})()):"▸ Обери реактив, потім натисни на пробірку"
        ),
        h('div',{style:{display:"flex",justifyContent:"center",gap:26,alignItems:"flex-end"}},
          so.map(function(s,i){return h(TestTube,{key:i,index:i,substance:s,reactions:tr[i],selected:sr!==null,onClick:function(){onTube(i);}});})
        ),
        h('div',{style:{marginTop:12,height:5,background:"#e8e5dd",borderRadius:3,marginLeft:-6,marginRight:-6}})
      ),

      // Toast
      lr&&lr.result.type!=="none"&&h('div',{key:"toast",style:{background:"#05966610",border:"1px solid #05966633",borderRadius:12,padding:"8px 14px",marginBottom:10,animation:"fadeIn .25s ease",display:"flex",alignItems:"center",gap:8}},
        h('span',{style:{fontSize:16}},(lr.result.type==="precipitate"||lr.result.type==="gas_precip")?"⬇️":lr.result.type==="gas"?"💨":lr.result.type==="color"?"🎨":lr.result.type==="indicator"?"📏":"👃"),
        h('span',{style:{fontSize:13,color:"#059669",fontWeight:600}},lr.result.desc)
      ),

      // Reagents shelf
      h('div',{key:"shelf",style:{background:"#fff",border:"1px solid #e0ddd5",borderRadius:14,padding:14,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,.03)"}},
        h('p',{style:{fontSize:11,color:"#aaa",marginBottom:10,fontFamily:"'IBM Plex Mono',monospace",textTransform:"uppercase",letterSpacing:1}},"🧴 Стіл з реактивами"),
        REAGENT_CATS.map(function(cat){
          var items=ALL_REAGENTS.filter(function(r){return r.cat===cat.id;});
          return h('div',{key:cat.id,style:{marginBottom:8}},
            h('p',{style:{fontSize:10,fontWeight:700,color:"#bbb",marginBottom:5,fontFamily:"'IBM Plex Mono',monospace"}},cat.label),
            h('div',{style:{display:"flex",gap:5,flexWrap:"wrap"}},
              items.map(function(r){return h(ReagentBottle,{key:r.id,reagent:r,selected:sr===r.id,onClick:function(){setSr(sr===r.id?null:r.id);}});})
            )
          );
        })
      ),

      h(ObsLog,{key:"log",obs:obs}),

      h('div',{key:"btns",style:{display:"flex",gap:10,marginBottom:14}},
        h('button',{onClick:function(){setPh("guess");setGu({});},disabled:obs.length===0,style:{flex:1,padding:"13px 20px",background:obs.length>0?"linear-gradient(135deg,#059669,#0284c7)":"#eee",borderRadius:12,color:obs.length>0?"#fff":"#ccc",fontSize:15,fontWeight:700,opacity:obs.length>0?1:.5,transition:"all .3s"}},"🏷️ Відповісти"),
        h('button',{onClick:function(){var v=!showHint;setHint(v);if(v)setEverHint(true);},style:{padding:"13px 16px",background:"#fff",border:"1px solid #e0ddd5",borderRadius:12,color:showHint?"#c2410c":"#ccc",fontSize:14}},"💡")
      ),

      showHint&&h('div',{key:"hint",style:{background:"#fef3c7",border:"1px solid #f59e0b44",borderRadius:12,padding:"10px 14px",marginBottom:14,animation:"fadeIn .25s ease"}},
        h('p',{style:{fontSize:13,color:"#92400e",margin:0}},"💡 "+ch.hint)
      )
    ]
  );
}

/* ═══════════ REFERENCE ═══════════ */
function RefScreen(p){
  var _sel=useState(null),sel=_sel[0],setSel=_sel[1];
  var keys=Object.keys(SUBSTANCES);
  var sub=sel?SUBSTANCES[sel]:null;
  return h('div',{style:{maxWidth:600,margin:"0 auto",padding:"0 14px"}},
    h('div',{style:{display:"flex",alignItems:"center",gap:10,marginBottom:18}},
      h('button',{onClick:p.onBack,style:{background:"none",color:"#999",fontSize:20,padding:"4px 6px"}},"←"),
      h('h3',{style:{fontSize:18,fontWeight:700,color:"#222"}},"📖 Таблиця реакцій")
    ),
    h('p',{style:{fontSize:12,color:"#999",marginBottom:12}},"Обери речовину:"),
    h('div',{style:{display:"flex",flexWrap:"wrap",gap:5,marginBottom:18}},
      keys.map(function(k){var s=SUBSTANCES[k],a=sel===k;
        return h('button',{key:k,onClick:function(){setSel(a?null:k);},style:{padding:"5px 10px",borderRadius:8,fontSize:12,fontFamily:"'IBM Plex Mono',monospace",fontWeight:a?700:500,background:a?"#0284c715":"#fff",border:"1.5px solid "+(a?"#0284c7":"#e0ddd5"),color:a?"#0284c7":"#555",transition:"all .2s"}},s.formula);
      })
    ),
    sub&&h('div',{style:{animation:"fadeIn .3s ease",background:"#fff",border:"1px solid #e0ddd5",borderRadius:14,padding:16,marginBottom:16}},
      h('h4',{style:{fontSize:16,fontWeight:700,color:"#0284c7",fontFamily:"'IBM Plex Mono',monospace",marginBottom:2}},sub.formula),
      h('p',{style:{fontSize:12,color:"#999",marginBottom:14}},sub.name),
      h('div',{style:{display:"flex",flexDirection:"column",gap:6}},
        ALL_REAGENTS.map(function(r){
          var rx=RX[sel]&&RX[sel][r.id];if(!rx)return null;var none=rx.type==="none";
          return h('div',{key:r.id,style:{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",background:"#faf9f6",borderRadius:8,opacity:none?.35:1}},
            h('span',{style:{fontSize:11,fontFamily:"'IBM Plex Mono',monospace",color:"#0284c7",minWidth:80,fontWeight:600}},"+"+r.formula),
            rx.precipColor&&h('div',{style:{width:14,height:14,borderRadius:4,background:rx.precipColor,flexShrink:0,border:"1px solid rgba(0,0,0,.1)"}}),
            (rx.type==="indicator"||rx.type==="color")&&rx.solChange&&h('div',{style:{width:14,height:14,borderRadius:"50%",background:rx.solChange,flexShrink:0,border:"1px solid rgba(0,0,0,.06)"}}),
            h('span',{style:{fontSize:11,color:none?"#ccc":"#444",lineHeight:"1.3"}},rx.desc)
          );
        })
      )
    ),
    !sub&&h('div',{style:{background:"#fff",border:"1px solid #e0ddd5",borderRadius:14,padding:24,textAlign:"center",color:"#ccc",fontSize:14}},"☝️ Обери речовину")
  );
}

/* ═══════════ HOME ═══════════ */
function HomeScreen(p){
  var prog=p.progress||loadProg();
  var totalStars=0,doneCount=Object.keys(prog.done).length;
  for(var k in prog.done)totalStars+=prog.done[k].stars||0;
  var earnedBadges=BADGES.filter(function(b){return prog.badges.indexOf(b.id)!==-1;});
  var _showBadges=useState(false),showBadges=_showBadges[0],setShowBadges=_showBadges[1];

  return h('div',{style:{maxWidth:560,margin:"0 auto",padding:"0 14px"}},
    h('div',{style:{textAlign:"center",marginBottom:24,paddingTop:20,animation:"fadeIn .5s ease"}},
      h('div',{style:{fontSize:52,marginBottom:4,animation:"float 3s ease-in-out infinite"}},"🧪"),
      h('h1',{style:{fontSize:28,fontWeight:800,letterSpacing:.5,background:"linear-gradient(135deg,#059669,#0284c7,#7c3aed)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:"0 0 4px"}},"ХімДетектив"),
      h('p',{style:{color:"#999",fontSize:13}},"Лабораторія якісних реакцій")
    ),
    // Stats bar
    h('div',{style:{display:"flex",gap:8,marginBottom:16,animation:"fadeIn .5s ease .05s both"}},
      h('div',{style:{flex:1,background:"#fff",border:"1px solid #e0ddd5",borderRadius:12,padding:"10px 8px",textAlign:"center"}},
        h('div',{style:{fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",color:"#059669"}},totalStars+"/48"),
        h('div',{style:{fontSize:10,color:"#aaa",textTransform:"uppercase",letterSpacing:1,marginTop:1}},"⭐ зірок")
      ),
      h('div',{style:{flex:1,background:"#fff",border:"1px solid #e0ddd5",borderRadius:12,padding:"10px 8px",textAlign:"center"}},
        h('div',{style:{fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",color:"#0284c7"}},doneCount+"/16"),
        h('div',{style:{fontSize:10,color:"#aaa",textTransform:"uppercase",letterSpacing:1,marginTop:1}},"✅ пройдено")
      ),
      h('div',{style:{flex:1,background:"#fff",border:"1px solid #e0ddd5",borderRadius:12,padding:"10px 8px",textAlign:"center"}},
        h('div',{style:{fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",color:"#7c3aed"}},earnedBadges.length+"/"+BADGES.length),
        h('div',{style:{fontSize:10,color:"#aaa",textTransform:"uppercase",letterSpacing:1,marginTop:1}},"🏅 бейджі")
      )
    ),
    // Badges button
    h('button',{onClick:function(){setShowBadges(!showBadges);},style:{width:"100%",padding:"12px 16px",background:"#fff",border:"1px solid #e0ddd5",borderRadius:14,display:"flex",alignItems:"center",gap:12,marginBottom:10,color:"#444",transition:"border-color .2s",boxShadow:"0 2px 8px rgba(0,0,0,.03)",animation:"fadeIn .5s ease .08s both"},onMouseEnter:function(e){e.currentTarget.style.borderColor="#7c3aed";},onMouseLeave:function(e){e.currentTarget.style.borderColor="#e0ddd5";}},
      h('span',{style:{fontSize:22}},"🏅"),
      h('div',{style:{textAlign:"left",flex:1}},
        h('p',{style:{fontSize:14,fontWeight:700,margin:0}},"Бейджі"),
        h('p',{style:{fontSize:11,color:"#999",margin:0}},earnedBadges.length?" Отримано: "+earnedBadges.map(function(b){return b.icon;}).join(" "):"Проходь завдання — отримуй нагороди!")
      ),
      h('span',{style:{fontSize:12,color:"#bbb",transition:"transform .2s",transform:showBadges?"rotate(90deg)":"rotate(0)",display:"inline-block"}},"▶")
    ),
    // Badges grid
    showBadges&&h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14,animation:"fadeIn .3s ease"}},
      BADGES.map(function(b){
        var earned=prog.badges.indexOf(b.id)!==-1;
        return h('div',{key:b.id,style:{background:earned?"#fff":"#faf9f6",border:"1px solid "+(earned?"#7c3aed33":"#e8e5dd"),borderRadius:12,padding:"10px 12px",opacity:earned?1:.5,transition:"all .2s"}},
          h('div',{style:{display:"flex",alignItems:"center",gap:6,marginBottom:4}},
            h('span',{style:{fontSize:20,filter:earned?"none":"grayscale(1)"}},b.icon),
            h('span',{style:{fontSize:12,fontWeight:700,color:earned?"#7c3aed":"#aaa"}},b.name)
          ),
          h('p',{style:{fontSize:10,color:earned?"#888":"#ccc",margin:0,lineHeight:"1.3"}},b.desc)
        );
      })
    ),
    // Reference
    h('button',{onClick:p.onRef,style:{width:"100%",padding:"14px 16px",background:"#fff",border:"1px solid #e0ddd5",borderRadius:14,display:"flex",alignItems:"center",gap:12,marginBottom:18,color:"#444",transition:"border-color .2s",boxShadow:"0 2px 8px rgba(0,0,0,.03)",animation:"fadeIn .5s ease .1s both"},onMouseEnter:function(e){e.currentTarget.style.borderColor="#0284c7";},onMouseLeave:function(e){e.currentTarget.style.borderColor="#e0ddd5";}},
      h('span',{style:{fontSize:24}},"📖"),
      h('div',{style:{textAlign:"left"}},
        h('p',{style:{fontSize:14,fontWeight:700,margin:0}},"Таблиця реакцій"),
        h('p',{style:{fontSize:11,color:"#999",margin:0}},"Довідник: речовина + реактив → результат")
      )
    ),
    LEVEL_META.map(function(lm){
      var cs=CHALLENGES.filter(function(c){return c.level===lm.level;});
      return h('div',{key:lm.level,style:{marginBottom:20,animation:"fadeIn .5s ease "+(.12+lm.level*.08)+"s both"}},
        h('div',{style:{display:"flex",alignItems:"center",gap:8,marginBottom:10}},
          h('span',{style:{fontSize:20}},lm.icon),
          h('h3',{style:{fontSize:15,fontWeight:700,margin:0,color:lm.color}},"Рівень "+lm.level+": "+lm.title)
        ),
        h('div',{style:{display:"flex",flexDirection:"column",gap:7,paddingLeft:6}},
          cs.map(function(c){
            var best=prog.done[c.id];
            var starsStr=best?"⭐".repeat(best.stars)+"☆".repeat(3-best.stars):"";
            return h('button',{key:c.id,onClick:function(){p.onSelect(c.id);},style:{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:"#fff",border:"1px solid "+(best?"#05966622":"#e0ddd5"),borderRadius:12,color:"#444",textAlign:"left",transition:"all .2s",boxShadow:"0 1px 4px rgba(0,0,0,.02)"},onMouseEnter:function(e){e.currentTarget.style.borderColor=lm.color;e.currentTarget.style.transform="translateX(3px)";},onMouseLeave:function(e){e.currentTarget.style.borderColor=best?"#05966622":"#e0ddd5";e.currentTarget.style.transform="translateX(0)";}},
              h('div',{style:{width:34,height:34,borderRadius:9,background:lm.color+"12",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",color:lm.color,flexShrink:0}},c.id),
              h('div',{style:{flex:1,minWidth:0}},
                h('p',{style:{fontSize:14,fontWeight:700,margin:"0 0 1px",color:"#333"}},c.title),
                h('p',{style:{fontSize:11,color:"#999",margin:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},c.desc)
              ),
              h('span',{style:{fontSize:11,color:"#ccc",fontFamily:"'IBM Plex Mono',monospace",flexShrink:0}},c.substances.length+"🧪"),
              best&&h('span',{style:{fontSize:11,flexShrink:0}},starsStr)
            );
          })
        )
      );
    }),
    h('p',{style:{textAlign:"center",color:"#ddd",fontSize:11,marginTop:20,fontFamily:"'IBM Plex Mono',monospace"}},"ХімДетектив v2.0 • ЗНО/НМТ")
  );
}

/* ═══════════ APP ═══════════ */
function App(){
  var _sc=useState("home"),sc=_sc[0],setSc=_sc[1];
  var _ac=useState(null),ac=_ac[0],setAc=_ac[1];
  var _prog=useState(loadProg()),prog=_prog[0],setProg=_prog[1];
  var refresh=function(){setProg(loadProg());};
  var next=useCallback(function(){
    var i=-1;CHALLENGES.forEach(function(c,idx){if(c.id===ac)i=idx;});
    if(i<CHALLENGES.length-1)setAc(CHALLENGES[i+1].id);else setSc("home");
  },[ac]);

  return h('div',{style:{minHeight:"100vh",background:"#f4f2ee",padding:"14px 0 40px"}},
    sc==="home"&&h(HomeScreen,{progress:prog,onSelect:function(id){setAc(id);setSc("game");},onRef:function(){setSc("reference");}}),
    sc==="game"&&ac&&h(GameScreen,{key:ac,challengeId:ac,onBack:function(){refresh();setSc("home");},onNext:next,onProgress:refresh}),
    sc==="reference"&&h(RefScreen,{onBack:function(){setSc("home");}})
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App));
</script>
</body>
